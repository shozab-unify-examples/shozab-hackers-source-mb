apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Main workflow
on:
  push:
    branches:
      - "**"
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  build-container-image:
    steps:
      - name: Get source code
        kind: build
        uses: cloudbees-io/checkout@v1
      - name: Configure container registry credentials
        kind: build
        uses: docker://alpine:3.20
        run: |
          echo "=== Configure container registry credentials (simulated) ==="
          echo "[SIMULATED] Authenticated to registry index.docker.io"
      - name: Build container image
        kind: build
        uses: docker://alpine:3.20
        run: |
          echo "=== Build container image (simulated) ==="
          echo "[SIMULATED] Building hackers-organized:${{ cloudbees.scm.sha }}"
          echo "[SIMULATED] Image built (no registry push — dummy workflow)"
      - name: Upload binary from container build
        kind: build
        uses: docker://alpine:3.20
        run: |
          echo "=== Upload binary from container build (simulated) ==="
          echo "[SIMULATED] Uploaded container-image.tar to artifact storage"
      - name: Register build artifact
        id: register-artifact
        kind: build
        uses: docker://alpine:3.20
        run: |
          ARTIFACT_ID="artifact-$(echo ${{ cloudbees.scm.sha }} | cut -c1-12)"
          echo "${ARTIFACT_ID}" >> $CLOUDBEES_OUTPUTS/artifact-id
          echo "=== Register build artifact (simulated) ==="
          echo "[SIMULATED] Registered artifact ${ARTIFACT_ID}"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 📦 Built and pushed image (simulated)

            This is a dummy workflow step — no real registry push occurred.

            **Artifact ID:** ${{ steps.register-artifact.outputs.artifact-id }}
            **Image:** hackers-organized:${{ cloudbees.scm.sha }}
          format: MARKDOWN
    outputs:
      ARTIFACT_ID: ${{ steps.register-artifact.outputs.artifact-id }}
  scan:
    outputs:
      BLOCKER_COUNT: ${{ steps.fake-scan.outputs.blocker-count }}
      CRITICAL_COUNT: ${{ steps.fake-scan.outputs.critical-count }}
      MAJOR_COUNT: ${{ steps.fake-scan.outputs.major-count }}
      MINOR_COUNT: ${{ steps.fake-scan.outputs.minor-count }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Run unit tests
        id: unit-tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "=== Running unit test suite (simulated) ==="
          echo "test_user_login              PASS   42ms"
          echo "test_user_logout             PASS   18ms"
          echo "test_claims_submission       PASS   67ms"
          echo "test_claims_validation       PASS   35ms"
          echo "test_eligibility_lookup      PASS   51ms"
          echo "test_payment_calculation     FAIL   29ms  - rounding edge case"
          echo "=== 5/6 PASSED (83%) ==="
          echo "83" >> $CLOUDBEES_OUTPUTS/pass-rate
          echo "6" >> $CLOUDBEES_OUTPUTS/total
          echo "5" >> $CLOUDBEES_OUTPUTS/passed
          echo "1" >> $CLOUDBEES_OUTPUTS/failed
      - name: Publish unit test evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🧪 Unit Test Results (simulated)

            | Test | Result | Duration |
            |------|--------|----------|
            | test_user_login | ✅ Pass | 42ms |
            | test_user_logout | ✅ Pass | 18ms |
            | test_claims_submission | ✅ Pass | 67ms |
            | test_claims_validation | ✅ Pass | 35ms |
            | test_eligibility_lookup | ✅ Pass | 51ms |
            | test_payment_calculation | ❌ Fail | 29ms — rounding edge case (non-blocking) |

            **${{ steps.unit-tests.outputs.passed }}/${{ steps.unit-tests.outputs.total }} passed (${{ steps.unit-tests.outputs.pass-rate }}%)**

            This is a dummy workflow step — no real test suite executed.
          format: MARKDOWN
      - name: Get code coverage
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "=== Get code coverage (simulated) ==="
          echo "[SIMULATED] test coverage: 84.3%"
      - name: Scan with SonarQube
        kind: scan
        uses: docker://alpine:3.20
        run: |
          echo "=== SonarQube SAST scan (simulated) ==="
          echo "[SIMULATED] 0 blocker, 0 critical, 2 major, 5 minor findings"
      - name: Snyk SAST
        kind: scan
        uses: docker://alpine:3.20
        run: |
          echo "=== Snyk SAST scan (simulated) ==="
          echo "[SIMULATED] No new SAST vulnerabilities found"
      - name: Snyk SCA
        kind: scan
        uses: docker://alpine:3.20
        run: |
          echo "=== Snyk SCA scan (simulated) ==="
          echo "[SIMULATED] 247 dependencies scanned, 0 critical/high"
      - name: Fetch scan results
        id: fake-scan
        kind: scan
        uses: docker://alpine:3.20
        run: |
          echo "0" >> $CLOUDBEES_OUTPUTS/blocker-count
          echo "0" >> $CLOUDBEES_OUTPUTS/critical-count
          echo "2" >> $CLOUDBEES_OUTPUTS/major-count
          echo "5" >> $CLOUDBEES_OUTPUTS/minor-count
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## SonarQube Analysis Results (simulated)

            | Severity | Issue Count |
            |----------|-------------|
            | Blocker  | ${{ steps.fake-scan.outputs.blocker-count }} |
            | Critical | ${{ steps.fake-scan.outputs.critical-count }} |
            | Major    | ${{ steps.fake-scan.outputs.major-count }} |
            | Minor    | ${{ steps.fake-scan.outputs.minor-count }} |
          format: MARKDOWN
  deploy:
    environment: demo
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Set kubeconfig
        kind: deploy
        uses: docker://alpine:3.20
        run: |
          echo "=== Set kubeconfig (simulated) ==="
          echo "[SIMULATED] kubeconfig configured for target cluster"
      - name: Deploy to cluster
        kind: deploy
        uses: docker://alpine:3.20
        run: |
          echo "=== Deploy to cluster (simulated) ==="
          echo "[SIMULATED] kustomize apply -k k8s/overlays/prod"
          echo "[SIMULATED] Deployment rolled out — 3/3 pods healthy"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🚀 Deployed environment (simulated)

            This is a dummy workflow — no real Kubernetes deployment occurred.

            Running hackers-organized:${{ cloudbees.scm.sha }}
            **Artifact ID:** ${{ needs.build-container-image.outputs.ARTIFACT_ID }}
          format: MARKDOWN
      - name: Register deployed artifact
        kind: deploy
        uses: docker://alpine:3.20
        run: |
          echo "=== Register deployed artifact (simulated) ==="
    needs:
      - build-container-image
      - scan
